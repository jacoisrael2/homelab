apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: travel-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6
        command: ["mongod"]
        args:
          - "--bind_ip_all"
          - "--dbpath"
          - "/data/db"
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: travel-budget
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
